name: Bug report
description: Something broke or behaves unexpectedly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in as much as you can.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expect
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. . .\init.ps1
        2. …
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Paste `vai-doctor` or `$PSVersionTable` + OS.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Optional — relevant log lines from `logs/vai-core.log`.
