name: Feature request
description: Idea for a module, command, or core improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alts
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core / registry
        - SEX
        - AgentHub
        - DockerTweaks
        - KubeTweaks
        - GitTweaks
        - DevBuild
        - CommandNotFound
        - Bash companion
        - Docs / CI
        - Other
    validations:
      required: true
